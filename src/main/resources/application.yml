spring:
  application:
  datasource:
    url: ${DB_URL:jdbc:sqlserver://localhost:1433;databaseName=PsyGst;encrypt=false;trustServerCertificate=true;sendTimeAsDatetime=false}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:root2024}
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.SQLServerDialect
        format_sql: true
        physical_naming_strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

# Configuración unificada de Google
google:
  script:
    url: ${GOOGLE_SCRIPT_URL:https://script.google.com/macros/s/AKfycbwOmL8DVedDO_aLUDu6zO1WMx-lrgQH0JgK6P2XKyJ49Cs-KHEH8b0TGf_D-sdqZF2J/exec}
    token: ${GOOGLE_SCRIPT_TOKEN:PsyGst_Token_987654321}
  credentials-path: ${GOOGLE_CREDENTIALS_PATH:}
  calendar-id: ${GOOGLE_CALENDAR_ID:}
  app-name: ${GOOGLE_APP_NAME:PsyGst}
  
server:
  port: 8080
  servlet:
    context-path: /api/v1

jwt:
  secret: ${JWT_SECRET:PsyGstSecretKey2024DefaultDevKeyMustBeAtLeast32CharactersLong}
  expiration-ms: ${JWT_EXPIRATION_MS:28800000}  # 8 hours

encryption:
  key: ${ENCRYPTION_KEY:PsyGstEncryptionKey2024DefaultDev}  # AES-256 — must be 32 chars in prod

whatsapp:
  provider: ${WHATSAPP_PROVIDER:ultramsg}  # Options: ultramsg, twilio, none
  ultramsg:
    instance-id: ${ULTRAMSG_INSTANCE_ID:instance165581}
    token: ${ULTRAMSG_TOKEN:ahtc51sjsxdvjdpx}
  twilio:
    account-sid: ${TWILIO_ACCOUNT_SID:}
    auth-token: ${TWILIO_AUTH_TOKEN:}
    from: ${TWILIO_WHATSAPP_FROM:}

pdf:
  storage-path: ${PDF_STORAGE_PATH:./storage/recibos}

cors:
  allowed-origins: ${CORS_ORIGINS:http://localhost:5173,http://localhost:3000,*}

logging:
  level:
    com.psygst: DEBUG
    org.springframework.security: WARN
